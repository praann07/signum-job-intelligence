name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check backend/
  test:
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_DB: signum
          POSTGRES_USER: signum
          POSTGRES_PASSWORD: signum_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U signum -d signum"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e backend/
      # ponytail: CI pip install doesn't pull the spaCy model (only the Docker
      # image does), so download it here or extraction fails at runtime.
      - run: python -m spacy download en_core_web_sm
      - run: alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://signum:signum_pass@localhost:5432/signum
          DATABASE_URL_SYNC: postgresql://signum:signum_pass@localhost:5432/signum
          REDIS_URL: redis://localhost:6379/0
      - run: python -m scripts.verify_pipeline
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://signum:signum_pass@localhost:5432/signum
          DATABASE_URL_SYNC: postgresql://signum:signum_pass@localhost:5432/signum
          REDIS_URL: redis://localhost:6379/0
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build backend
