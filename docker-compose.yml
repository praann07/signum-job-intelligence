services:
  timescaledb:
    restart: unless-stopped
    image: timescale/timescaledb:latest-pg17
    container_name: signum-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signum}
      POSTGRES_USER: ${POSTGRES_USER:-signum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signum_pass}
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signum -d signum"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    container_name: signum-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    restart: unless-stopped
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://signum:signum_pass@timescaledb:5432/signum"
      DATABASE_URL_SYNC: "postgresql://signum:signum_pass@timescaledb:5432/signum"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  caddy:
    restart: unless-stopped
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  scheduler:
    restart: unless-stopped
    build: ./backend
    command: ["sh", "-c", "alembic upgrade head && python -m app.worker"]
    environment:
      DATABASE_URL: "postgresql+asyncpg://signum:signum_pass@timescaledb:5432/signum"
      DATABASE_URL_SYNC: "postgresql://signum:signum_pass@timescaledb:5432/signum"
      REDIS_URL: "redis://redis:6379/0"
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  timescaledb_data:
  caddy_data:
  caddy_config:
